# Asymmetric bi-encoder: frozen BGE + trainable projection on doc side
# Query encoder : BAAI/bge-base-zh-v1.5 (frozen, 768-dim output)
# Doc side      : pre-encoded Qwen3-VL-2B (2048-dim) + MLPx4 or GLUx4 (2048→768)

project_name: "asym_biencoder"
project_dir: "output_asym_biencoder"
wandb_project: "qilin_multimodal_ir"
mixed_precision: "fp16"

model:
  variant: "doc_mlp"
  proj_type: "mlp"               # mlp | glu
  model_name_or_path: "/data/rech/huiyuche/huggingface/models--BAAI--bge-base-zh-v1.5/snapshots/f03589ceff5aac7111bd60cfc7d497ca17ecac65"
  doc_dim: 2048                  # keep full 2048-dim; MLP projects to 768

datasets:
  dataset_name_or_path: "/data/rech/huiyuche/multimodal_rag/datasets/qilin/"
  doc_emb_dir: "/part/01/Tmp/yuchenhui/multimodal_rag/embeddings/qilin_qwen3vl_fp16"
  batch_size: 64
  negative_samples: 6
  max_length: 256
  num_workers: 4
  use_title: true
  use_content: true
  query_instruction: ""

training:
  num_epochs: 10
  eval_steps: 1000
  save_steps: 1000
  log_steps: 50
  negatives_x_device: true
  resume: false

optimizer:
  name: AdamW
  kwargs:
    lr: 1.0e-3
    weight_decay: 0.01
    betas: [0.9, 0.999]
    eps: 1.0e-8

scheduler:
  name: LinearLR
  kwargs:
    warmup_steps: 100

evaluation:
  target_metric: "MRR@10"
  qrels_data_path: "/data/rech/huiyuche/multimodal_rag/datasets/search.test.qrels.csv"
