# Asymmetric bi-encoder: LoRA fine-tune BGE query encoder
# Query encoder : BAAI/bge-base-zh-v1.5 + LoRA (r=8, attn+FFN)
# Doc side      : pre-encoded Qwen3-VL-2B embeddings, MRL-truncated to 768

project_name: "asym_biencoder"
project_dir: "output_asym_biencoder"
wandb_project: "qilin_multimodal_ir"
mixed_precision: "fp16"

model:
  variant: "lora"
  proj_type: "mlp"               # unused for lora variant
  model_name_or_path: "/data/rech/huiyuche/huggingface/models--BAAI--bge-base-zh-v1.5/snapshots/f03589ceff5aac7111bd60cfc7d497ca17ecac65"
  doc_dim: 768
  # LoRA hyperparameters
  lora_r: 8
  lora_alpha: 16
  lora_dropout: 0.1

datasets:
  dataset_name_or_path: "/data/rech/huiyuche/multimodal_rag/datasets/qilin/"
  doc_emb_dir: "/part/01/Tmp/yuchenhui/multimodal_rag/embeddings/qilin_qwen3vl_fp16"
  batch_size: 32
  negative_samples: 6
  max_length: 256
  num_workers: 4
  use_title: true
  use_content: true
  query_instruction: ""

training:
  num_epochs: 5
  eval_steps: 1000
  save_steps: 1000
  log_steps: 50
  negatives_x_device: true
  resume: false

optimizer:
  name: AdamW
  kwargs:
    lr: 3.0e-4
    weight_decay: 0.01
    betas: [0.9, 0.999]
    eps: 1.0e-8

scheduler:
  name: LinearLR
  kwargs:
    warmup_steps: 200

evaluation:
  target_metric: "MRR@10"
  qrels_data_path: "/data/rech/huiyuche/multimodal_rag/datasets/search.test.qrels.csv"
